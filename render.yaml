services:
  - type: worker
    name: lode-telegram-bot
    runtime: python
    plan: free
    pythonVersion: "3.12.7"
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
    startCommand: python -u bot.py
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: BOT_TOKEN
        sync: false
      - key: ROOM_TX_URL
        value: https://t.me/xombaoref
      - key: DB_PATH
        value: lode.db
